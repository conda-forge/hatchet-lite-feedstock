context:
  version: "0.87.14"

package:
  name: hatchet-lite
  version: ${{ version }}

source:
  - url: https://github.com/hatchet-dev/hatchet/archive/refs/tags/v${{ version }}.tar.gz
    sha256: d3876fb52b2af04af14e0c85ea41faec1e20655b3ddfe46121c270161aaaa3aa
    target_directory: src
  - url: https://raw.githubusercontent.com/mattn/go-localereader/6bae6c923850ab5e0da9f36f69811ffe17064228/LICENSE
    sha256: dceede03550621e65ec7b79fcba87cf6dbb9d31132a8ae71a8fe8ceec0af7da3
    file_name: LICENSE-go-localereader

build:
  number: 1
  skip: win

requirements:
  build:
    - ${{ compiler("go-nocgo") }}
    - go-licenses
    - nodejs 22.*
    - pnpm
    - python 3.13.*

tests:
  - script:
      - echo "$LITE_STATIC_ASSET_DIR"
      - test -d "$LITE_STATIC_ASSET_DIR"
      - hatchet-lite --help
      - hatchet-lite --version
  - package_contents:
      bin:
        - hatchet-lite

about:
  homepage: https://hatchet.run
  summary: Hatchet Lite - a lightweight Hatchet engine for development and testing
  description: |
    Hatchet is an orchestration engine for background tasks, AI agents, and
    durable workflows. This package provides the hatchet-lite binary for
    running a lightweight Hatchet engine locally for development and testing.
  license: MIT
  license_file:
    - src/LICENSE
    - library_licenses/
    - LICENSE-go-localereader
  documentation: https://docs.hatchet.run
  repository: https://github.com/hatchet-dev/hatchet

extra:
  recipe-maintainers:
    - xhochy
